<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMA Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel2: #1c2128;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --purple: #bc8cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5em; margin: 0 0 4px; display: flex; align-items: center; gap: 10px; }
    .sub { color: var(--muted); font-size: 0.85em; margin-bottom: 18px; }

    /* Tabs */
    .tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg);
      z-index: 10; padding-top: 4px;
    }
    .tab-btn {
      background: none; border: none; color: var(--muted);
      padding: 10px 20px; font-size: 1em; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      border-radius: 8px 8px 0 0; font-family: inherit;
      transition: all .15s ease;
    }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--blue); background: var(--panel); }
    .tab-btn:hover  { color: var(--text); background: rgba(255,255,255,.03); }
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadein .25s ease; }
    @keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* Stat cards */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .card {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; transition: border-color .15s ease;
    }
    .card:hover { border-color: #484f58; }
    .card .label { color: var(--muted); font-size: 0.72em; text-transform: uppercase; letter-spacing: .06em; }
    .card .value { font-size: 1.5em; font-weight: 700; margin-top: 6px; letter-spacing: -.01em; }
    .pos { color: var(--green); }
    .neg { color: var(--red); }

    /* Equity chart */
    .chart-box {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 20px;
    }
    .chart-box .label { color: var(--muted); font-size: 0.72em; text-transform: uppercase; letter-spacing:.06em; margin-bottom: 10px; }
    #equityChart { max-height: 200px; }

    /* Sections */
    section { margin-bottom: 24px; }
    h2 {
      font-size: 1.05em; padding-bottom: 8px; margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
      border: none; background: none; padding: 0 0 10px 0;
    }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th { color: var(--muted); font-weight: 500; font-size: 0.8em; text-transform: uppercase; letter-spacing:.03em; }
    tbody tr { transition: background .1s ease; }
    tbody tr:hover td { background: rgba(255,255,255,0.03); }

    .scroll-x {
      overflow-x: auto; border-radius: 10px;
      border: 1px solid var(--border); background: var(--panel);
    }
    .scroll-x table { font-size: 0.83em; }
    .scroll-x th, .scroll-x td { border-bottom: 1px solid var(--border); }
    .scroll-x tbody tr:last-child td { border-bottom: none; }

    /* Tags */
    .tag {
      display: inline-block; padding: 2px 8px;
      border-radius: 5px; font-size: 0.8em; font-weight: 600;
    }
    .tag-LONG  { background: rgba(63,185,80,.15);  color: var(--green); }
    .tag-SHORT { background: rgba(248,81,73,.15);  color: var(--red); }
    .tag-sl    { background: rgba(248,81,73,.15);  color: var(--red); }
    .tag-tp1   { background: rgba(210,153,34,.18); color: var(--yellow); }
    .tag-tp2   { background: rgba(63,185,80,.15);  color: var(--green); }
    .tag-end   { background: rgba(139,148,158,.15);color: var(--muted); }

    /* Strategy label chips */
    .strat-chip {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: .75em; font-weight: 500;
    }

    /* Position cards */
    .pos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 12px;
    }
    .pos-card {
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; transition: border-color .15s ease;
    }
    .pos-card:hover { border-color: #484f58; }
    .pos-card-head {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .pos-card-head .symbol { font-size: 1.05em; font-weight: 700; }
    .pos-card .upnl-line {
      text-align: center; font-size: 1.3em; font-weight: 700;
      padding: 8px 0 12px;
    }
    .pos-card .upnl-line .pct {
      font-size: 0.6em; font-weight: 500; color: var(--muted);
      display: block; margin-top: 2px;
    }
    .pos-card .row {
      display: flex; justify-content: space-between;
      font-size: 0.83em; padding: 4px 0;
      border-bottom: 1px dashed var(--border);
    }
    .pos-card .row:last-child { border-bottom: none; }
    .pos-card .row .label { color: var(--muted); }
    .pos-card .row .hit { color: var(--green); font-weight: 600; }

    /* Filter buttons */
    .filter-bar { display: flex; gap: 6px; margin-bottom: 10px; }
    .filter-btn {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--muted); padding: 5px 14px; font-size: 0.82em;
      font-weight: 600; border-radius: 20px; cursor: pointer;
      font-family: inherit; transition: all .15s ease;
    }
    .filter-btn:hover { border-color: #484f58; color: var(--text); }
    .filter-btn.active { color: var(--text); border-color: var(--blue); background: rgba(88,166,255,.12); }
    .filter-btn.active.win  { border-color: var(--green); background: rgba(63,185,80,.12);  color: var(--green); }
    .filter-btn.active.loss { border-color: var(--red);   background: rgba(248,81,73,.12);  color: var(--red); }

    /* Scan button */
    .scan-btn {
      background: rgba(88,166,255,.15); border: 1px solid rgba(88,166,255,.35);
      color: var(--blue); padding: 8px 20px; border-radius: 8px;
      font-family: inherit; font-size: 0.9em; font-weight: 600;
      cursor: pointer; transition: all .15s ease;
    }
    .scan-btn:hover { background: rgba(88,166,255,.25); }
    .scan-btn:disabled { opacity: .5; cursor: not-allowed; }

    .scan-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      flex-wrap: wrap;
    }
    .scan-card .desc { color: var(--muted); font-size: 0.85em; margin-top: 4px; }
    .scan-result {
      display: none; margin-top: 12px; padding: 10px 14px;
      border-radius: 8px; background: rgba(88,166,255,.08);
      border: 1px solid rgba(88,166,255,.2); font-size: 0.85em;
    }

    .empty { color: var(--muted); padding: 16px 0; text-align: center; font-size: 0.9em; }

    /* Progress bar */
    .progress-bar-wrap {
      height: 5px; background: var(--border);
      border-radius: 3px; overflow: hidden; margin: 8px 0 12px;
    }
    .progress-bar-fill {
      height: 100%; border-radius: 3px; transition: width .4s;
    }
  </style>
</head>
<body>

  <div class="tabs">
    <button class="tab-btn active" data-tab="main">📊 EMA Scanner</button>
    <button class="tab-btn" data-tab="scanner">🔍 掃描 &amp; 訊號</button>
    <button class="tab-btn" data-tab="history">📜 交易紀錄</button>
  </div>

  <!-- ───────── 主頁 ───────── -->
  <div class="tab-content active" id="tab-main">
    <h1>📊 EMA Scanner <span style="color:var(--muted);font-size:0.6em;font-weight:400;">(BingX 4H 永續合約)</span></h1>
    <div class="sub" id="meta">載入中...</div>

    <div class="grid" id="stats-grid"></div>

    <div class="chart-box">
      <div class="label">資金曲線</div>
      <canvas id="equityChart"></canvas>
    </div>

    <section>
      <h2>📌 持倉中 (Open Positions)</h2>
      <div class="pos-grid" id="pos-grid"></div>
      <div class="empty" id="pos-empty" style="display:none">目前沒有持倉</div>
    </section>
  </div>

  <!-- ───────── 掃描 & 訊號 ───────── -->
  <div class="tab-content" id="tab-scanner">
    <h1>🔍 掃描 &amp; 訊號</h1>

    <div class="scan-card">
      <div>
        <div style="font-weight:600;">立即掃描全市場</div>
        <div class="desc">對所有 BingX USDT 永續合約執行 EMA 收斂突破掃描，達標訊號自動開虛擬倉。</div>
      </div>
      <button class="scan-btn" id="scan-btn" onclick="triggerScan()">▶ 立即掃描</button>
    </div>
    <div class="scan-result" id="scan-result"></div>

    <section>
      <h2>🕐 訊號歷史（最近 50 筆）</h2>
      <div class="scroll-x">
        <table id="sig-table">
          <thead>
            <tr>
              <th>時間</th><th>幣種</th><th>策略</th><th>方向</th>
              <th>分數</th><th>進場</th><th>止損</th><th>TP1</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="sig-empty" style="display:none">尚無訊號 — 點「立即掃描」開始</div>
    </section>
  </div>

  <!-- ───────── 交易紀錄 ───────── -->
  <div class="tab-content" id="tab-history">
    <h1>📜 交易紀錄</h1>

    <div class="grid" id="hist-stats-grid"></div>

    <section>
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all"  onclick="setFilter('all',this)">全部</button>
        <button class="filter-btn win"    data-filter="win"  onclick="setFilter('win',this)">獲利</button>
        <button class="filter-btn loss"   data-filter="loss" onclick="setFilter('loss',this)">虧損</button>
      </div>
      <div class="scroll-x">
        <table id="hist-table">
          <thead>
            <tr>
              <th>幣種</th><th>方向</th><th>策略</th><th>原因</th>
              <th>進場</th><th>出場</th><th>損益</th><th>分數</th><th>平倉時間</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="empty" id="hist-empty" style="display:none">尚無成交紀錄</div>
    </section>
  </div>

<script>
  // ── Helpers ──────────────────────────────────────
  function fmt(n, d=4) {
    if (n === null || n === undefined) return "—";
    return Number(n).toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:d});
  }
  function pnlClass(v) { return v > 0 ? "pos" : (v < 0 ? "neg" : ""); }
  function fmtP(v) {
    if (v === null || v === undefined) return "—";
    const n = Number(v);
    const d = n >= 1000 ? 2 : n >= 1 ? 4 : 6;
    return n.toLocaleString("en-US", {minimumFractionDigits:d, maximumFractionDigits:d});
  }

  function dirTag(d) {
    return `<span class="tag tag-${d}">${d}</span>`;
  }
  function reasonTag(r) {
    const m = {SL:"sl", TP1:"tp1", TP2:"tp2"};
    return `<span class="tag tag-${m[r]||"end"}">${r}</span>`;
  }
  function stratChip(s) {
    const map = {
      EMA_CONVERGENCE: ["#8957e5","EMA收斂"],
      EMA_PULLBACK:    ["#58a6ff","EMA回測"],
      RSI_BOUNCE:      ["#d29922","RSI反彈"],
      MACD_CROSS:      ["#3fb950","MACD交叉"],
      BB_BREAKOUT:     ["#f0883e","BB突破"],
      EMA_CROSS_FAST:  ["#79c0ff","EMA快叉"],
      SWING_BREAK:     ["#ff7b72","擺幅突破"],
      OI_LS_SIGNAL:    ["#bc8cff","OI多空比"],
    };
    const [c, l] = map[s] || ["#8b949e", s||"—"];
    return `<span class="strat-chip" style="background:${c}22;color:${c};">${l}</span>`;
  }

  // ── Equity Chart ──────────────────────────────────
  let chart = null;
  function drawChart(labels, data) {
    if (chart) chart.destroy();
    const ctx = document.getElementById("equityChart").getContext("2d");
    const grad = ctx.createLinearGradient(0,0,0,200);
    grad.addColorStop(0, "rgba(88,166,255,.18)");
    grad.addColorStop(1, "rgba(88,166,255,.0)");
    chart = new Chart(ctx, {
      type: "line",
      data: { labels, datasets:[{
        data, borderColor:"#58a6ff", backgroundColor: grad,
        borderWidth:1.5, fill:true,
        pointRadius: data.length > 40 ? 0 : 3, tension:.3
      }]},
      options: {
        responsive:true, maintainAspectRatio:true,
        plugins:{ legend:{display:false}, tooltip:{
          callbacks:{ label: c => " $" + c.parsed.y.toLocaleString() }
        }},
        scales:{
          x:{ ticks:{color:"#8b949e", maxTicksLimit:8, font:{size:11}}, grid:{color:"#21262d"}},
          y:{ ticks:{color:"#8b949e", callback: v=>"$"+v.toLocaleString(), font:{size:11}}, grid:{color:"#21262d"}}
        }
      }
    });
  }

  // ── History filter ────────────────────────────────
  let _allTrades = [];
  let _filter = "all";

  function setFilter(f, btn) {
    _filter = f;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderHistory();
  }

  function renderHistory() {
    const data = _filter === "win"  ? _allTrades.filter(t => t.pnl > 0)
               : _filter === "loss" ? _allTrades.filter(t => t.pnl <= 0)
               : _allTrades;
    const tbody = document.querySelector("#hist-table tbody");
    const empty = document.getElementById("hist-empty");
    if (!data.length) {
      tbody.innerHTML = "";
      empty.style.display = "block";
    } else {
      empty.style.display = "none";
      tbody.innerHTML = data.map(t => `
        <tr>
          <td>${t.symbol}</td>
          <td>${dirTag(t.direction)}</td>
          <td>${stratChip(t.strategy)}</td>
          <td>${reasonTag(t.reason)}</td>
          <td>${fmtP(t.entry)}</td>
          <td>${fmtP(t.exit)}</td>
          <td class="${pnlClass(t.pnl)}">$${fmt(t.pnl,2)}</td>
          <td>${t.score}</td>
          <td style="color:var(--muted);font-size:0.82em;">${t.close_time}</td>
        </tr>`).join("");
    }
  }

  // ── Load account data ─────────────────────────────
  async function loadAccount() {
    try {
      const res = await fetch("/api/account");
      const d   = await res.json();
      const s   = d.stats;

      document.getElementById("meta").textContent =
        `EMA Pullback 策略 | 持倉中: ${s.open_positions ?? 0} | 上次更新: ${new Date().toLocaleTimeString("zh-TW")}`;

      // Stats cards
      const ret = s.total_return_pct ?? 0;
      const cards = [
        ["帳戶餘額",   `$${fmt(s.current_balance, 2)}`, ""],
        ["總損益",     `$${fmt(s.total_pnl ?? 0, 2)} (${fmt(ret,2)}%)`, pnlClass(s.total_pnl ?? 0)],
        ["持倉中",     s.open_positions ?? 0, ""],
        ["已平倉次數", s.full_closes ?? 0, ""],
        ["勝率",       `${fmt(s.win_rate_pct ?? 0, 1)}%`, ""],
        ["最大回撤",   `${fmt(s.max_drawdown_pct ?? 0, 2)}%`, "neg"],
      ];
      document.getElementById("stats-grid").innerHTML = cards.map(([label, value, cls]) =>
        `<div class="card"><div class="label">${label}</div><div class="value ${cls}">${value}</div></div>`
      ).join("");

      // Equity chart
      if (d.equity_curve && d.equity_curve.labels) {
        drawChart(d.equity_curve.labels, d.equity_curve.data);
      }

      // Positions
      const posGrid = document.getElementById("pos-grid");
      if (!d.positions.length) {
        posGrid.innerHTML = "";
        document.getElementById("pos-empty").style.display = "block";
      } else {
        document.getElementById("pos-empty").style.display = "none";
        posGrid.innerHTML = d.positions.map(p => {
          const r = p.progress_r ?? 0;
          const barPct = Math.min(Math.max((r + 1) / 3.5 * 100, 0), 100);
          const barCol = r < 0 ? "var(--red)" : r > 1.5 ? "var(--green)" : "#58a6ff";
          return `
          <div class="pos-card">
            <div class="pos-card-head">
              <span class="symbol">${p.symbol}</span>
              <span>${dirTag(p.direction)}</span>
            </div>
            <div class="upnl-line ${pnlClass(p.upnl)}">
              ${p.upnl === null ? "—" : `$${fmt(p.upnl,2)}`}
              <span class="pct">${p.upnl === null ? "" : `(${fmt(p.upnl_pct,2)}%)`}</span>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar-fill" style="width:${barPct}%;background:${barCol};"></div>
            </div>
            <div class="row"><span class="label">策略</span><span>${stratChip(p.strategy)}</span></div>
            <div class="row"><span class="label">分數</span><span>${p.score}</span></div>
            <div class="row"><span class="label">進場價</span><span>${fmtP(p.entry)}</span></div>
            <div class="row"><span class="label">現價</span><span>${p.cur_price === null ? "—" : fmtP(p.cur_price)}</span></div>
            <div class="row"><span class="label">止損</span><span style="color:var(--red)">${fmtP(p.stop_loss)}</span></div>
            <div class="row"><span class="label">TP1</span><span class="${p.tp1_hit ? "hit" : ""}" style="color:var(--yellow)">${fmtP(p.target_1)}${p.tp1_hit ? " ✓" : ""}</span></div>
            <div class="row"><span class="label">TP2</span><span style="color:var(--green)">${fmtP(p.target_2)}</span></div>
            <div class="row"><span class="label">名目金額</span><span>$${fmt(p.notional,2)}</span></div>
            <div class="row"><span class="label">開倉時間</span><span>${p.open_time}</span></div>
            <div class="row"><span class="label">持倉</span><span>${p.duration}</span></div>
          </div>`;
        }).join("");
      }

      // History tab stats
      const hp = s.total_pnl ?? 0;
      document.getElementById("hist-stats-grid").innerHTML = [
        ["總損益",   `$${fmt(hp,2)}`,               pnlClass(hp)],
        ["完整平倉", `${s.full_closes ?? 0} 筆`,    ""],
        ["平均獲利", `+$${fmt(s.avg_win ?? 0,2)}`,  "pos"],
        ["平均虧損", `$${fmt(s.avg_loss ?? 0,2)}`,  "neg"],
      ].map(([label, value, cls]) =>
        `<div class="card"><div class="label">${label}</div><div class="value ${cls}">${value}</div></div>`
      ).join("");

      _allTrades = d.trades || [];
      renderHistory();

    } catch (e) {
      document.getElementById("meta").textContent = "載入失敗：" + e;
    }
  }

  // ── Load signals ──────────────────────────────────
  async function loadSignals() {
    try {
      const arr = await (await fetch("/api/signals")).json();
      const tbody = document.querySelector("#sig-table tbody");
      const empty = document.getElementById("sig-empty");
      if (!arr.length) {
        tbody.innerHTML = "";
        empty.style.display = "block";
      } else {
        empty.style.display = "none";
        tbody.innerHTML = arr.map(s => `
          <tr>
            <td style="color:var(--muted);font-size:.82em;">${s.time}</td>
            <td><strong>${s.symbol.replace("-USDT","")}</strong></td>
            <td>${stratChip(s.strategy || "EMA_CONVERGENCE")}</td>
            <td>${dirTag(s.direction)}</td>
            <td><span style="background:rgba(88,166,255,.15);color:#58a6ff;padding:2px 8px;border-radius:4px;font-size:.78em;">${s.score}</span></td>
            <td>${fmtP(s.entry)}</td>
            <td style="color:var(--red)">${fmtP(s.stop_loss)}</td>
            <td style="color:var(--yellow)">${fmtP(s.target1)}</td>
          </tr>`).join("");
      }
    } catch(e) {}
  }

  // ── Manual scan ───────────────────────────────────
  let scanPoll = null;
  async function triggerScan() {
    const btn = document.getElementById("scan-btn");
    const res = document.getElementById("scan-result");
    btn.disabled = true; btn.textContent = "⏳ 掃描中...";
    res.style.display = "none";

    const r = await fetch("/api/scan", {method:"POST"});
    if (!r.ok) {
      const e = await r.json();
      alert(e.error); btn.disabled=false; btn.textContent="▶ 立即掃描"; return;
    }
    clearInterval(scanPoll);
    scanPoll = setInterval(async () => {
      const st = await (await fetch("/api/task/status")).json();
      if (!st.running) {
        clearInterval(scanPoll);
        btn.disabled=false; btn.textContent="▶ 立即掃描";
        if (st.error) { alert("錯誤："+st.error); return; }
        const found  = st.result?.found  ?? 0;
        const opened = st.result?.opened ?? 0;
        res.style.display = "";
        res.innerHTML = `✅ 掃描完成 — 達標訊號 <strong>${found}</strong> 個，新開虛擬倉 <strong>${opened}</strong> 筆`;
        loadSignals(); loadAccount();
      }
    }, 3000);
  }

  // ── Tab switching ─────────────────────────────────
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
      btn.classList.add("active");
      const id = "tab-" + btn.dataset.tab;
      document.getElementById(id).classList.add("active");
      if (btn.dataset.tab === "scanner") loadSignals();
    });
  });

  // ── Init ──────────────────────────────────────────
  loadAccount();
  setInterval(loadAccount, 5 * 60 * 1000);
</script>
</body>
</html>
